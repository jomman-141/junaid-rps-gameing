<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rock Paper Scissors — JUNAID AHMED</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--glass:rgba(255,255,255,0.03)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:linear-gradient(180deg,#071023 0%, #081226 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .container{width:100%;max-width:820px}
    header{text-align:center;margin-bottom:18px}
    h1{margin:0;font-size:32px;letter-spacing:0.4px}
    p.lead{margin:6px 0 0;color:var(--muted)}

    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:14px;padding:18px;box-shadow:0 8px 30px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.04)}

    .scoreboard{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
    .score{flex:1;text-align:center;padding:12px;background:var(--glass);border-radius:10px}
    .score .label{font-size:14px;color:var(--muted)}
    .score .value{font-size:36px;font-weight:700;color:var(--accent);margin-top:6px}

    .board{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .choice-card{background:rgba(255,255,255,0.01);padding:12px;border-radius:12px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    .choice-card h3{margin:0 0 8px;font-size:18px}
    .choice-display{width:120px;height:120px;border-radius:12px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,0.35);font-weight:700}
    .reveal-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,10,15,0.6);backdrop-filter:blur(4px);border-radius:12px}

    .result-area{text-align:center;min-height:68px;margin-bottom:14px}
    .result-area h2{margin:6px 0;font-size:28px}
    .explain{color:var(--muted);max-width:560px;margin:0 auto}

    .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{background:#213047;border:0;padding:10px 14px;border-radius:10px;color:#e6eef8;cursor:pointer;font-weight:600}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .btn.choice{width:92px;height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;border-radius:12px}
    .btn.rock{background:linear-gradient(180deg,#2563eb,#1e40af)}
    .btn.paper{background:linear-gradient(180deg,#10b981,#047857)}
    .btn.scissors{background:linear-gradient(180deg,#ef4444,#b91c1c)}

    .small{font-size:13px;padding:8px 10px;border-radius:8px}

    footer{margin-top:12px;text-align:center;color:var(--muted);font-size:13px}

    @media (max-width:560px){.board{grid-template-columns:1fr;}.choice-display{width:100px;height:100px;font-size:40px}.btn.choice{width:80px;height:80px}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Rock • Paper • Scissors</h1>
      <p class="lead">Made by JUNAID AHMED — No AI. Music included.</p>
    </header>

    <div class="card">
      <div class="scoreboard">
        <div class="score">
          <div class="label">You</div>
          <div id="userScore" class="value">0</div>
        </div>
        <div class="score">
          <div class="label">Computer</div>
          <div id="computerScore" class="value">0</div>
        </div>
      </div>

      <div class="board">
        <div class="choice-card">
          <h3>You</h3>
          <div id="userDisplay" class="choice-display">?</div>
        </div>
        <div class="choice-card">
          <h3>Computer</h3>
          <div id="computerDisplay" class="choice-display">?</div>
          <div id="spinner" class="reveal-spinner" style="display:none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><circle cx="12" cy="12" r="10" stroke-opacity="0.15"></circle><path d="M22 12a10 10 0 0 0-10-10" stroke-opacity="1"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></path></svg>
          </div>
        </div>
      </div>

      <div class="result-area">
        <h2 id="resultText"></h2>
        <p id="explain" class="explain"></p>
      </div>

      <div class="controls">
        <button class="btn choice rock" data-choice="rock">✊<span style="font-size:12px;margin-top:6px">Rock</span></button>
        <button class="btn choice paper" data-choice="paper">🖐<span style="font-size:12px;margin-top:6px">Paper</span></button>
        <button class="btn choice scissors" data-choice="scissors">✌️<span style="font-size:12px;margin-top:6px">Scissors</span></button>

        <button id="resetBtn" class="btn small">Reset Score</button>
        <button id="toggleMusic" class="btn small">Play Music</button>
        <a id="downloadBtn" class="btn small" href="#" download="rps.html">Download</a>
      </div>

    </div>

    <footer>
      Tip: To get a permanent link, upload this single HTML file to Netlify Drop or GitHub Pages.
    </footer>
  </div>

  <audio id="bgAudio" loop crossorigin="anonymous">
    <source src="https://storage.googleapis.com/studiopanda-assets/assets/sounds/bg_music_s3.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function(){
      const CHOICES = ['rock','paper','scissors'];
      const EMOJI = { rock: '✊', paper: '🖐', scissors: '✌️' };

      const userScoreEl = document.getElementById('userScore');
      const compScoreEl = document.getElementById('computerScore');
      const userDisplay = document.getElementById('userDisplay');
      const compDisplay = document.getElementById('computerDisplay');
      const spinner = document.getElementById('spinner');
      const resultText = document.getElementById('resultText');
      const explain = document.getElementById('explain');
      const resetBtn = document.getElementById('resetBtn');
      const toggleMusicBtn = document.getElementById('toggleMusic');
      const downloadBtn = document.getElementById('downloadBtn');

      let userScore = 0; let compScore = 0; let isLoading = false; let audioPlaying = false;
      const audio = document.getElementById('bgAudio');
      audio.volume = 0.45;

      // Music toggle
      toggleMusicBtn.addEventListener('click', () => {
        if(!audioPlaying){
          audio.play().catch(err=>console.warn('Autoplay prevented'));
          audioPlaying = true; toggleMusicBtn.textContent = 'Pause Music';
        } else { audio.pause(); audioPlaying = false; toggleMusicBtn.textContent = 'Play Music'; }
      });

      // Download current page
      downloadBtn.addEventListener('click', (e)=>{
        e.preventDefault();
        const html = '<!doctype html>' + document.documentElement.outerHTML;
        const blob = new Blob([html], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        downloadBtn.href = url;
        setTimeout(()=>URL.revokeObjectURL(url), 60000);
        downloadBtn.click();
      });

      function setScores(){ userScoreEl.textContent = userScore; compScoreEl.textContent = compScore; }

      function determineResult(user, comp){
        if(user === comp) return 'tie';
        if((user==='rock'&&comp==='scissors')||(user==='scissors'&&comp==='paper')||(user==='paper'&&comp==='rock')) return 'win';
        return 'lose';
      }

      function choiceHandler(choice){
        if(isLoading) return; // prevent double clicks
        isLoading = true;
        resultText.textContent = '';
        explain.textContent = '';
        userDisplay.textContent = EMOJI[choice];
        compDisplay.textContent = '?';
        spinner.style.display = 'flex';

        // simulate thinking
        setTimeout(()=>{
          const compChoice = CHOICES[Math.floor(Math.random()*CHOICES.length)];
          spinner.style.display = 'none';
          compDisplay.textContent = EMOJI[compChoice];

          const res = determineResult(choice, compChoice);
          if(res==='win'){ userScore++; resultText.textContent = 'You Win!'; }
          else if(res==='lose'){ compScore++; resultText.textContent = 'You Lose!'; }
          else { resultText.textContent = "It's a Tie!"; }

          // friendly explanation (no AI)
          if(res==='win') explain.textContent = `${capitalize(choice)} beats ${compChoice}. Good move!`;
          else if(res==='lose') explain.textContent = `${capitalize(compChoice)} beats ${choice}. Try again!`;
          else explain.textContent = `Both played ${choice}. Well played!`;

          setScores();
          isLoading = false;
        }, 700);
      }

      function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}

      document.querySelectorAll('.btn.choice').forEach(b => b.addEventListener('click', ()=>choiceHandler(b.dataset.choice)));
      resetBtn.addEventListener('click', ()=>{ userScore=0; compScore=0; setScores(); userDisplay.textContent='?'; compDisplay.textContent='?'; resultText.textContent=''; explain.textContent=''; });

      // friendly hint: click music once to enable audio due to autoplay policies

    })();
  </script>
</body>
</html>
